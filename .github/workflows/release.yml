name: Release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build Windows Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure workflow runs from main
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "This workflow must be run from the main branch. Current branch: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify app version metadata
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          const packageJsonVersion = JSON.parse(fs.readFileSync('package.json', 'utf8')).version;
          const tauriConfigVersion = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8')).version;
          const cargoToml = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
          const cargoVersionMatch = cargoToml.match(/^version\s*=\s*"([^"]+)"/m);

          if (!cargoVersionMatch) {
            console.error('Unable to read version from src-tauri/Cargo.toml.');
            process.exit(1);
          }

          const versions = {
            packageJson: packageJsonVersion,
            tauriConfig: tauriConfigVersion,
            cargoToml: cargoVersionMatch[1],
          };

          if (new Set(Object.values(versions)).size !== 1) {
            console.error('Version mismatch detected:', versions);
            process.exit(1);
          }

          fs.appendFileSync(process.env.GITHUB_ENV, `APP_VERSION=${packageJsonVersion}\n`);
          console.log(`Release version ${packageJsonVersion} verified.`);
          EOF

      - name: Ensure release tag does not already exist
        shell: bash
        run: |
          tag="v${APP_VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Release tag ${tag} already exists." >&2
            exit 1
          fi

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: Nocturn v__VERSION__
          releaseBody: |
            See the assets attached to this release to install Nocturn.
          releaseDraft: true
          prerelease: false
