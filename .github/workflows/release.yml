name: Release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build Windows Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Ensure workflow runs from main
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "This workflow must be run from the main branch. Current branch: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify app version metadata
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          const packageJsonVersion = JSON.parse(fs.readFileSync('package.json', 'utf8')).version;
          const tauriConfigVersion = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8')).version;
          const cargoToml = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
          const cargoVersionMatch = cargoToml.match(/^version\s*=\s*"([^"]+)"/m);

          if (!cargoVersionMatch) {
            console.error('Unable to read version from src-tauri/Cargo.toml.');
            process.exit(1);
          }

          const versions = {
            packageJson: packageJsonVersion,
            tauriConfig: tauriConfigVersion,
            cargoToml: cargoVersionMatch[1],
          };

          if (new Set(Object.values(versions)).size !== 1) {
            console.error('Version mismatch detected:', versions);
            process.exit(1);
          }

          fs.appendFileSync(process.env.GITHUB_ENV, `APP_VERSION=${packageJsonVersion}\n`);
          console.log(`Release version ${packageJsonVersion} verified.`);
          EOF

      - name: Ensure release tag does not already exist
        shell: bash
        run: |
          tag="v${APP_VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Release tag ${tag} already exists." >&2
            exit 1
          fi

      - name: Ensure updater signing secrets are configured
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "Missing TAURI_SIGNING_PRIVATE_KEY secret." >&2
            exit 1
          fi

      - name: Build and publish release
        uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Nocturn v__VERSION__
          releaseBody: |
            See the assets attached to this release to install or auto-update Nocturn.
          releaseDraft: false
          prerelease: false
