<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nocturn Overlay</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        cursor: none;
      }

      #overlay {
        width: 100%;
        height: 100%;
        background: #000;
        opacity: 0;
        transition: opacity 35ms linear;
      }

      #overlay.is-visible {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="overlay"></div>
    <script>
      const overlay = document.getElementById("overlay");

      window.startFadeOut = () => {
        overlay.style.transition = "opacity 180ms ease-out";
        overlay?.classList.remove("is-visible");
      };

      requestAnimationFrame(() => {
        overlay.style.transition = "opacity 35ms linear";
        overlay?.classList.add("is-visible");
      });
    </script>
  </body>
</html>
